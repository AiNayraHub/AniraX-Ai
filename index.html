<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Pro | Gemini Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #303030; border-radius: 10px; }
        .user-msg { background: #2b2b2b; border-radius: 18px; padding: 12px 20px; max-width: 80%; align-self: flex-end; }
        .ai-msg { display: flex; gap: 15px; max-width: 90%; margin-bottom: 25px; }
        .ai-icon { background: linear-gradient(45deg, #4285f4, #9b72cb); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .input-box { background: #1e1f20; border: 1px solid #3c4043; border-radius: 30px; transition: 0.3s; }
        .input-box:focus-within { background: #28292a; border-color: #8ab4f8; }
        pre { background: #000; padding: 15px; border-radius: 10px; overflow-x: auto; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="w-full p-5 flex justify-between items-center max-w-4xl">
        <h1 class="text-2xl font-semibold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
            AI Assistant
        </h1>
        <div class="text-sm text-gray-400">Powered by DeepSeek</div>
    </header>

    <main id="chatWindow" class="chat-container w-full max-w-4xl flex flex-col p-4 gap-6">
        <div class="flex flex-col items-center justify-center h-full text-center opacity-50 mt-20" id="welcome">
            <div class="ai-icon mb-4 w-12 h-12 text-xl"><i class="fas fa-robot"></i></div>
            <h2 class="text-2xl">Main aapki kaise madad kar sakta hoon?</h2>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full p-4 bg-[#131314]">
        <div class="max-w-4xl mx-auto relative">
            <div class="input-box flex items-center px-5 py-3">
                <textarea id="userInput" rows="1" placeholder="Ask anything..." 
                    class="bg-transparent border-none outline-none w-full resize-none text-lg"></textarea>
                <button id="sendBtn" class="ml-3 text-blue-400 hover:text-white transition">
                    <i class="fas fa-paper-plane text-xl"></i>
                </button>
            </div>
            <p class="text-center text-[10px] text-gray-500 mt-2">AI can make mistakes. Check important info.</p>
        </div>
    </footer>

    <script>
        const API_KEY = "sk-c522f9efbc45490488bbfb14abec0bf5"; // Aapka Key yahan hai
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        async function getAIResponse(prompt) {
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: prompt }],
                        stream: false
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                return "Bhai, error aa gaya! Check karo API key active hai ya nahi.";
            }
        }

        function appendMessage(role, text) {
            welcome.classList.add('hidden');
            const div = document.createElement('div');
            
            if (role === 'user') {
                div.className = "user-msg";
                div.innerText = text;
            } else {
                div.className = "ai-msg";
                div.innerHTML = `
                    <div class="ai-icon"><i class="fas fa-bolt text-sm"></i></div>
                    <div class="flex-1 leading-relaxed">${text.replace(/\n/g, '<br>')}</div>
                `;
            }
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = "text-gray-500 text-sm ml-12 animate-pulse";
            loadingDiv.innerText = "Thinking...";
            chatWindow.appendChild(loadingDiv);

            const aiText = await getAIResponse(text);
            chatWindow.removeChild(loadingDiv);
            appendMessage('ai', aiText);
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChat();
            }
        });
    </script>
</body>
</html>
