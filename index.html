<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Chat - DeepSeek Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0e1117; color: #e6edf3; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .glass-header { background: rgba(14, 17, 23, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #30363d; }
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 20px; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        .user-bubble { background: #21262d; border: 1px solid #30363d; border-radius: 20px 20px 4px 20px; padding: 12px 18px; margin-left: auto; max-width: 85%; }
        .ai-bubble { display: flex; gap: 12px; max-width: 90%; margin-bottom: 24px; animation: fadeIn 0.4s ease; }
        
        .ai-avatar { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #1d4ed8, #7c3aed); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .input-wrapper { background: #161b22; border: 1px solid #30363d; border-radius: 16px; transition: 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .input-wrapper:focus-within { border-color: #58a6ff; ring: 1px solid #58a6ff; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        code { background: #0d1117; padding: 2px 6px; border-radius: 4px; color: #ff7b72; font-family: monospace; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="glass-header sticky top-0 z-50 w-full px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">D</div>
            <span class="text-lg font-medium tracking-tight">DeepSeek <span class="text-blue-400">AI</span></span>
        </div>
        <div class="flex gap-4">
            <i class="fa-solid fa-gear text-gray-400 hover:text-white cursor-pointer"></i>
            <i class="fa-solid fa-circle-user text-gray-400 hover:text-white cursor-pointer text-xl"></i>
        </div>
    </header>

    <main id="chatBox" class="chat-container flex flex-col p-4 md:px-20 lg:px-64 gap-6 flex-grow">
        <div id="welcome" class="flex flex-col items-center justify-center h-full text-center py-20">
            <h2 class="text-4xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Hello, Aryan</h2>
            <p class="text-gray-400 text-lg max-w-md">How can I assist you with your project or coding today?</p>
        </div>
    </main>

    <footer class="p-4 md:px-20 lg:px-64 bg-[#0e1117]">
        <div class="input-wrapper flex items-end p-2 px-4 gap-2">
            <textarea id="promptInput" rows="1" placeholder="Message DeepSeek..." 
                class="bg-transparent border-none outline-none w-full py-3 resize-none max-h-40 text-gray-100"></textarea>
            <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 p-2.5 px-3 rounded-xl mb-1 transition-all disabled:opacity-50">
                <i class="fa-solid fa-arrow-up text-white"></i>
            </button>
        </div>
        <p class="text-[11px] text-center text-gray-500 mt-2">Built for professional workflows. Use AI responsibly.</p>
    </footer>

    <script>
        // API Configuration
        const API_KEY = "sk-c522f9efbc45490488bbfb14abec0bf5";
        const API_URL = "https://api.deepseek.com/v1/chat/completions";

        const chatBox = document.getElementById('chatBox');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');

        // Textarea auto-resize
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        async function getAIResponse(userMessage) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "user", content: userMessage }],
                        stream: false
                    })
                });

                if (!response.ok) throw new Error('API Request Failed');
                
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                console.error(err);
                return "Bhai, server se connection nahi ho paa raha. Check kariye API key valid hai ya nahi.";
            }
        }

        function createMessage(role, content) {
            if(welcome) welcome.style.display = 'none';
            
            const div = document.createElement('div');
            if (role === 'user') {
                div.className = "user-bubble";
                div.innerText = content;
            } else {
                div.className = "ai-bubble";
                div.innerHTML = `
                    <div class="ai-avatar"><i class="fa-solid fa-sparkles text-xs"></i></div>
                    <div class="flex-1 space-y-2 whitespace-pre-wrap">${content}</div>
                `;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function startChat() {
            const msg = promptInput.value.trim();
            if (!msg) return;

            createMessage('user', msg);
            promptInput.value = '';
            promptInput.style.height = 'auto';
            sendBtn.disabled = true;

            const loader = document.createElement('div');
            loader.className = "text-gray-500 text-sm ml-12 italic animate-pulse";
            loader.innerText = "Analyzing...";
            chatBox.appendChild(loader);

            const reply = await getAIResponse(msg);
            chatBox.removeChild(loader);
            createMessage('ai', reply);
            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click', startChat);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                startChat();
            }
        });
    </script>
</body>
</html>
