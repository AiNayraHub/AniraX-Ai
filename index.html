<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gamevoo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: none; /* Prevents pull-to-refresh on mobile */
        }
        
        .dark-transition { transition: background-color 0.2s, color 0.2s; }
        
        /* Mobile-Safe Layout */
        .app-wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        /* Sidebar transition */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        
        /* Markdown / Code Styling */
        .prose pre { 
            background: #1e1e1e; 
            color: #d4d4d4; 
            padding: 1rem; 
            border-radius: 0.5rem; 
            overflow-x: auto; 
            margin: 0.8rem 0; 
            font-size: 0.875rem;
        }
        .prose code { background: rgba(0,0,0,0.05); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; }
        .dark .prose code { background: rgba(255,255,255,0.1); }
        
        #loading {
            position: fixed; inset: 0; background: white; display: flex;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .dark #loading { background: #111827; color: white; }

        /* Animation for AI typing */
        .typing-cursor::after {
            content: "|";
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 dark-transition">

    <div id="loading">🚀 Loading Gamevoo...</div>

    <div class="app-wrapper relative">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 hidden lg:hidden z-40" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 -translate-x-full lg:translate-x-0 flex flex-col shadow-xl lg:shadow-none">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h1 class="font-bold text-xl tracking-tight text-blue-600 dark:text-blue-400">Gamevoo</h1>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-500">✕</button>
            </div>
            
            <div class="p-4">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-4 rounded-xl transition-all shadow-sm font-medium">
                    <span>+</span> New Chat
                </button>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-1">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-1">
                <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 p-2.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <span id="theme-icon">🌙</span> Dark Mode
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-2.5 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <span>⚙️</span> Settings
                </button>
            </div>
        </aside>

        <main class="lg:ml-72 flex flex-col h-full relative">
            <header class="h-16 flex-none bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 p-4 flex items-center gap-4 z-30">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">
                    ☰
                </button>
                <div class="flex-1 truncate">
                    <h2 id="current-chat-title" class="font-medium truncate text-gray-600 dark:text-gray-300 italic">Welcome back, Aryan</h2>
                </div>
            </header>

            <div id="chat-container" class="p-4">
                <div id="messages-wrapper" class="max-w-3xl mx-auto w-full flex flex-col gap-6 pb-32">
                    <div id="welcome-screen" class="flex flex-col items-center justify-center mt-20 text-center space-y-4">
                        <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900 rounded-2xl flex items-center justify-center text-3xl">🎮</div>
                        <h3 class="text-2xl font-semibold">How can I help you?</h3>
                        <p class="text-gray-500 text-sm">Add your API Key in settings to unlock Gamevoo's intelligence.</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 pt-10">
                <div class="max-w-3xl mx-auto relative">
                    <div class="relative flex items-end gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-2xl shadow-xl p-2 focus-within:border-blue-500 transition-all">
                        <textarea id="user-input" rows="1" placeholder="Type a message..." 
                            class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-4 max-h-40 outline-none"
                            oninput="autoResize(this)"></textarea>
                        <button id="send-btn" onclick="handleSendMessage()" 
                            class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 active:scale-95 transition-all">
                            <svg class="w-5 h-5 rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden scale-in">
            <div class="p-6 space-y-4">
                <div class="flex justify-between items-center border-b pb-3 dark:border-gray-700">
                    <h3 class="text-xl font-bold">Project Gamevoo Settings</h3>
                    <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white">✕</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="w-full p-2.5 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Model ID</label>
                        <input type="text" id="model-input" class="w-full p-2.5 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="deepseek/deepseek-r1:free">
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">
                        Save Configuration
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use a Proxy-based state for easy reactivity
        const state = {
            apiKey: localStorage.getItem('gv_api_key') || '',
            model: localStorage.getItem('gv_model') || 'deepseek/deepseek-r1:free',
            darkMode: localStorage.getItem('gv_dark_mode') === 'true',
            chats: JSON.parse(localStorage.getItem('gv_chats') || '[]'),
            currentChatId: null,
            isStreaming: false
        };

        // --- Init Logic ---
        window.onload = () => {
            if (state.darkMode) document.documentElement.classList.add('dark');
            renderChatList();
            document.getElementById('loading').style.display = 'none';

            // Global Enter Key Listener
            document.getElementById('user-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
        };

        // --- UI Utils ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            
            sidebar.classList.toggle('-translate-x-full', !isHidden);
            sidebar.classList.toggle('translate-x-0', isHidden);
            overlay.classList.toggle('hidden', !isHidden);
        }

        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            document.documentElement.classList.toggle('dark', state.darkMode);
            document.getElementById('theme-icon').innerText = state.darkMode ? '☀️' : '🌙';
            localStorage.setItem('gv_dark_mode', state.darkMode);
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        // --- Chat Operations ---
        function createNewChat() {
            const id = Date.now().toString();
            const newChat = { id, title: 'New Conversation', messages: [] };
            state.chats.unshift(newChat);
            saveData();
            loadChat(id);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            document.getElementById('current-chat-title').innerText = chat.title;
            
            const wrapper = document.getElementById('messages-wrapper');
            wrapper.innerHTML = '';
            
            if (chat.messages.length === 0) {
                document.getElementById('welcome-screen').style.display = 'flex';
                wrapper.appendChild(document.getElementById('welcome-screen'));
            } else {
                document.getElementById('welcome-screen').style.display = 'none';
                chat.messages.forEach(m => appendMessageUI(m.role, m.content));
            }
            renderChatList();
        }

        function appendMessageUI(role, content) {
            const wrapper = document.getElementById('messages-wrapper');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const isAI = role === 'assistant';
            div.innerHTML = `
                <div class="${isAI ? 'bg-white dark:bg-gray-800 border dark:border-gray-700' : 'bg-blue-600 text-white'} p-4 rounded-2xl max-w-[90%] shadow-sm prose dark:prose-invert">
                    <div class="text-[10px] uppercase font-bold mb-1 opacity-50">${role}</div>
                    <div class="msg-text break-words">${isAI ? marked.parse(content) : escapeHTML(content)}</div>
                </div>
            `;
            wrapper.appendChild(div);
            scrollToBottom();
            return div;
        }

        // --- API Integration ---
        async function handleSendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || state.isStreaming) return;
            if (!state.apiKey) return openSettings();

            if (!state.currentChatId) createNewChat();
            
            // UI Update
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('welcome-screen').style.display = 'none';
            
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (chat.messages.length === 0) chat.title = text.slice(0, 25) + '...';
            
            chat.messages.push({ role: 'user', content: text });
            appendMessageUI('user', text);
            saveData();
            renderChatList();

            // AI Response (Streaming)
            state.isStreaming = true;
            const aiDiv = appendMessageUI('assistant', '');
            const textEl = aiDiv.querySelector('.msg-text');
            textEl.classList.add('typing-cursor');
            let fullText = "";

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: chat.messages,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error('API Key invalid or rate limited');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    // OpenRouter sends multiple data: {...} lines in one chunk sometimes
                    const lines = chunk.split('\n');
                    
                    for (let line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.replace('data: ', '');
                        if (dataStr.trim() === '[DONE]') continue;
                        
                        try {
                            const json = JSON.parse(dataStr);
                            const delta = json.choices[0].delta?.content || "";
                            fullText += delta;
                            textEl.innerHTML = marked.parse(fullText);
                            scrollToBottom();
                        } catch (e) { /* partial chunk */ }
                    }
                }
                chat.messages.push({ role: 'assistant', content: fullText });
                saveData();
            } catch (err) {
                textEl.innerHTML = `<span class="text-red-500 font-bold">Error: ${err.message}</span>`;
            } finally {
                state.isStreaming = false;
                textEl.classList.remove('typing-cursor');
            }
        }

        // --- Data Management ---
        function saveData() {
            localStorage.setItem('gv_chats', JSON.stringify(state.chats));
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(c => `
                <div class="group flex items-center justify-between p-2.5 rounded-xl cursor-pointer transition-all ${state.currentChatId === c.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-medium' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}" onclick="loadChat('${c.id}')">
                    <span class="truncate text-sm flex-1 mr-2">💬 ${c.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${c.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500">🗑️</button>
                </div>
            `).join('');
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) state.currentChatId = null;
            saveData();
            location.reload(); // Quick reset
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value.trim();
            state.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
            localStorage.setItem('gv_api_key', state.apiKey);
            localStorage.setItem('gv_model', state.model);
            closeSettings();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>
