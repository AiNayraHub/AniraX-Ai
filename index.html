<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AniraX AI - Smart Assistant</title>
    <style>
        /* === Premium Light UI Setup === */
        :root {
            --bg-color: #f8f9fa;
            --header-bg: #ffffff;
            --text-main: #212529;
            --gold-accent: #d4a017;
            --user-bubble: #e9ecef;
            --ai-bubble: #ffffff;
            --border: #dee2e6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overscroll-behavior: none;
        }

        /* === Header === */
        header {
            background: var(--header-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .app-title { font-size: 20px; font-weight: 700; color: var(--gold-accent); letter-spacing: 1px; }

        /* === Chat Area === */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .user-msg {
            align-self: flex-end;
            background-color: var(--gold-accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* === Typing Animation === */
        .typing { font-size: 14px; color: #888; display: none; margin-left: 5px; }

        /* === Input Area === */
        .input-wrapper {
            background: var(--header-bg);
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 16px;
            background: #f1f3f5;
        }

        #user-input:focus { border-color: var(--gold-accent); background: white; }

        #send-btn {
            background: var(--gold-accent);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        #send-btn:active { transform: scale(0.9); }

        /* History Side Button */
        #history-btn { position: absolute; left: 15px; background: none; border: none; font-size: 20px; cursor: pointer; }

    </style>
</head>
<body>

    <header>
        <button id="history-btn">🕒</button>
        <div class="app-title">AniraX AI</div>
    </header>

    <div id="chat-container">
        <div class="message ai-msg">
            Namaste! Main AniraX AI hoon. Main aapki kaise madad kar sakta hoon? Aap mujhse kisi bhi bhasha mein baat kar sakte hain.
        </div>
    </div>

    <div id="typing-indicator" class="typing" style="padding: 0 20px 10px;">AniraX is thinking...</div>

    <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Yahan apna sawal likhein..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>

    <script>
        const API_KEY = "sk-c522f9efbc45490488bbfb14abec0bf5";
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Function to Add Message to UI
        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // DeepSeek API Call
        async function getAIResponse(text) {
            typingIndicator.style.display = 'block';
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "user", content: text}],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                if (data.choices && data.choices[0]) {
                    appendMessage(data.choices[0].message.content, false);
                } else {
                    appendMessage("Maaf kijiye, kuch galati hui. Dobara koshish karein.", false);
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage("Network error! Please check your connection.", false);
            }
        }

        // Handle Send
        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';
            getAIResponse(text);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

    </script>
</body>
</html>
