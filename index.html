<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamevoo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth transition for dark mode */
        .dark-transition { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        
        /* Mobile height fixes */
        .main-container { min-height: 100vh; display: flex; flex-direction: column; }
        #chat-container { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        
        /* Sidebar transitions */
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 50; }
        
        /* Markdown Styling */
        .prose pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .prose code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 0.2rem 0.4rem; border-radius: 0.25rem; }
        .dark .prose code { background: rgba(255,255,255,0.1); }
        .prose p { margin-bottom: 1rem; line-height: 1.6; }
        
        /* Hide scrollbar but allow scrolling */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #loading {
            position: fixed; inset: 0; background: white; display: flex;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .dark #loading { background: #111827; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 dark-transition">

    <div id="loading">🚀 Initializing Gamevoo...</div>

    <div class="main-container relative">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 hidden lg:hidden z-40" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 -translate-x-full lg:translate-x-0 flex flex-col">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h1 class="font-bold text-xl tracking-tight">Gamevoo</h1>
                <button onclick="toggleSidebar()" class="lg:hidden p-2">✕</button>
            </div>
            
            <div class="p-4">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-full transition-all shadow-sm">
                    <span class="text-xl">+</span> New Chat
                </button>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1 no-scrollbar">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button onclick="toggleDarkMode()" class="w-full flex items-center gap-3 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                    <span id="theme-icon">🌙</span> Dark Mode
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                    <span>⚙️</span> Settings
                </button>
            </div>
        </aside>

        <main class="lg:ml-72 flex flex-col flex-1 relative min-h-screen">
            <header class="sticky top-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 p-4 flex items-center gap-4 z-30">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">
                    ☰
                </button>
                <div class="flex-1 truncate">
                    <h2 id="current-chat-title" class="font-medium truncate text-gray-600 dark:text-gray-300">New Conversation</h2>
                </div>
            </header>

            <div id="chat-container" class="px-4 py-6 max-w-4xl mx-auto w-full flex flex-col gap-6">
                <div id="welcome-screen" class="flex flex-col items-center justify-center mt-20 text-center space-y-4">
                    <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900 rounded-2xl flex items-center justify-center text-3xl">🤖</div>
                    <h3 class="text-2xl font-semibold">How can I help you today?</h3>
                    <p class="text-gray-500 max-w-sm">Enter your OpenRouter API key in settings to start chatting with DeepSeek.</p>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 lg:left-72 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 via-gray-50 dark:via-gray-900 to-transparent">
                <div class="max-w-4xl mx-auto relative">
                    <div class="relative flex items-end gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-2xl p-2 shadow-lg focus-within:ring-2 focus-within:ring-blue-500/50 transition-all">
                        <textarea id="user-input" rows="1" placeholder="Ask Gamevoo anything..." 
                            class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-4 max-h-40 overflow-y-auto outline-none"
                            oninput="autoResize(this)"></textarea>
                        <button id="send-btn" onclick="handleSendMessage()" 
                            class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                            <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
                        </button>
                    </div>
                    <p class="text-[10px] text-center mt-2 text-gray-400">Powered by OpenRouter API • Experimental Interface</p>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold">Settings</h3>
                    <button onclick="closeSettings()" class="text-gray-500 hover:text-gray-700">✕</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="w-full p-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Model Name</label>
                        <input type="text" id="model-input" class="w-full p-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="deepseek/deepseek-r1:free">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">System Prompt</label>
                        <textarea id="system-prompt-input" rows="3" class="w-full p-2 rounded-lg border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="You are a helpful assistant..."></textarea>
                    </div>
                </div>

                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let state = {
            apiKey: localStorage.getItem('gv_api_key') || '',
            model: localStorage.getItem('gv_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('gv_system_prompt') || 'You are Gamevoo, a helpful and concise AI assistant.',
            darkMode: localStorage.getItem('gv_dark_mode') === 'true',
            chats: JSON.parse(localStorage.getItem('gv_chats')) || [],
            currentChatId: null,
            isStreaming: false
        };

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderChatList();
            document.getElementById('loading').style.display = 'none';
            
            // Handle Enter Key
            document.getElementById('user-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
        });

        function initTheme() {
            if (state.darkMode) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').innerText = '☀️';
            }
        }

        // --- Core UI Logic ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = sidebar.classList.contains('translate-x-0');
            
            if (isOpen) {
                sidebar.classList.replace('translate-x-0', '-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.replace('-translate-x-full', 'translate-x-0');
                overlay.classList.remove('hidden');
            }
        }

        function toggleDarkMode() {
            state.darkMode = !state.darkMode;
            document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').innerText = state.darkMode ? '☀️' : '🌙';
            localStorage.setItem('gv_dark_mode', state.darkMode);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
        }

        // --- Chat Logic ---
        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: []
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveChats();
            renderChatList();
            loadChat(newChat.id);
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            document.getElementById('current-chat-title').innerText = chat.title;
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            
            if (chat.messages.length === 0) {
                document.getElementById('welcome-screen').style.display = 'flex';
            } else {
                document.getElementById('welcome-screen').style.display = 'none';
                chat.messages.forEach(msg => appendMessageUI(msg.role, msg.content));
            }
            renderChatList();
        }

        function appendMessageUI(role, content, isNew = false) {
            document.getElementById('welcome-screen').style.display = 'none';
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;
            
            const innerHTML = `
                <div class="max-w-[85%] sm:max-w-2xl px-4 py-3 rounded-2xl ${
                    role === 'user' 
                    ? 'bg-blue-600 text-white rounded-tr-none' 
                    : 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-tl-none prose dark:prose-invert'
                }">
                    <div class="text-sm font-bold mb-1 opacity-70">${role === 'user' ? 'You' : 'Gamevoo'}</div>
                    <div class="msg-content">${role === 'user' ? escapeHtml(content) : marked.parse(content)}</div>
                </div>
            `;
            
            msgDiv.innerHTML = innerHTML;
            container.appendChild(msgDiv);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            return msgDiv;
        }

        async function handleSendMessage() {
            const input = document.getElementById('user-input');
            const content = input.value.trim();
            if (!content || state.isStreaming) return;
            if (!state.apiKey) return alert('Please set your OpenRouter API Key in Settings.');

            if (!state.currentChatId) createNewChat();

            // Clear Input
            input.value = '';
            autoResize(input);

            // Update State & UI (User)
            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            if (currentChat.messages.length === 0) {
                currentChat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
            }
            currentChat.messages.push({ role: 'user', content });
            appendMessageUI('user', content);
            saveChats();
            renderChatList();

            // Prepare AI Placeholder
            state.isStreaming = true;
            const aiMsgDiv = appendMessageUI('assistant', '...');
            const contentDiv = aiMsgDiv.querySelector('.msg-content');
            let fullAiContent = '';

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Gamevoo UI'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: 'system', content: state.systemPrompt },
                            ...currentChat.messages
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                contentDiv.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        if (line.includes('[DONE]')) continue;
                        try {
                            const data = JSON.parse(line.replace('data: ', ''));
                            const token = data.choices[0].delta?.content || '';
                            fullAiContent += token;
                            contentDiv.innerHTML = marked.parse(fullAiContent);
                            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
                        } catch (e) {}
                    }
                }

                currentChat.messages.push({ role: 'assistant', content: fullAiContent });
                saveChats();

            } catch (err) {
                contentDiv.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
            } finally {
                state.isStreaming = false;
            }
        }

        // --- Data Persistence ---
        function saveChats() {
            localStorage.setItem('gv_chats', JSON.stringify(state.chats));
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(chat => `
                <div class="group relative flex items-center p-2 rounded-lg cursor-pointer ${state.currentChatId === chat.id ? 'bg-gray-100 dark:bg-gray-700' : 'hover:bg-gray-50 dark:hover:bg-gray-800'}" 
                    onclick="loadChat('${chat.id}')">
                    <span class="flex-1 truncate text-sm">${chat.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="hidden group-hover:block p-1 text-gray-400 hover:text-red-500">🗑️</button>
                </div>
            `).join('');
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) {
                state.currentChatId = null;
                document.getElementById('chat-container').innerHTML = '';
                document.getElementById('welcome-screen').style.display = 'flex';
                document.getElementById('current-chat-title').innerText = 'Conversation Deleted';
            }
            saveChats();
            renderChatList();
        }

        // --- Settings Logic ---
        function openSettings() {
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value.trim();
            state.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
            state.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            
            localStorage.setItem('gv_api_key', state.apiKey);
            localStorage.setItem('gv_model', state.model);
            localStorage.setItem('gv_system_prompt', state.systemPrompt);
            
            closeSettings();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
